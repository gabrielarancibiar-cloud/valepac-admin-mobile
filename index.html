<style>
:root{--blue:#0b2f5b;--blue2:#2563eb;--cyan:#38bdf8;--bg:#eef4fb;--text:#0f172a;--muted:#64748b;--border:#dbe7f3}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at 8% 8%,rgba(37,99,235,.16),transparent 34%),linear-gradient(135deg,#f8fbff,#eef4fb 60%,#fff);color:var(--text);min-height:100vh}
.hidden{display:none!important}button,input,select,textarea{font:inherit}button{cursor:pointer}textarea{resize:vertical;min-height:96px}
.card{background:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.9);border-radius:24px;padding:18px;margin-bottom:12px;box-shadow:0 18px 48px rgba(15,23,42,.10)}
.login{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:28px;max-width:540px;margin:auto}.brand{font-size:24px;font-weight:950;color:var(--blue);letter-spacing:.6px}.hero h1{font-size:38px;line-height:1;margin:18px 0 10px;color:var(--blue)}.hero p{color:var(--muted);font-weight:700;line-height:1.45}
label{display:block;font-size:12px;color:var(--muted);font-weight:900;margin:10px 0 6px;text-transform:uppercase}
input,select,textarea{width:100%;border:1px solid #cbd5e1;border-radius:16px;padding:14px;background:#fff;color:var(--text)}
.primary{width:100%;border:0;border-radius:18px;padding:15px 18px;background:linear-gradient(135deg,var(--blue2),#0ea5e9);color:#fff;font-weight:950;box-shadow:0 14px 30px rgba(37,99,235,.22)}
.secondary{border:1px solid #cbd5e1;background:#fff;color:var(--blue);border-radius:16px;padding:13px 16px;font-weight:900}
.ghost{border:0;background:#eef6ff;color:var(--blue);border-radius:16px;padding:13px 16px;font-weight:900}
.msg{margin-top:12px;border-radius:16px;padding:12px;font-weight:800}.error{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}
.app{min-height:100vh;padding-bottom:86px}.header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(148,163,184,.25);padding:14px 16px}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:10px}.header h2{margin:0;color:var(--blue);font-size:18px}.header small{display:block;color:var(--muted);font-weight:800;margin-top:3px}.user{font-size:12px;background:#eef6ff;color:var(--blue);border:1px solid #dbeafe;border-radius:999px;padding:8px 10px;font-weight:950}
.main{padding:16px;max-width:760px;margin:0 auto}.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}.kpi{background:#fff;border:1px solid var(--border);border-radius:20px;padding:14px;box-shadow:0 12px 34px rgba(15,23,42,.08)}.kpi small{color:var(--muted);font-weight:900}.kpi b{display:block;font-size:24px;color:var(--blue);margin-top:4px}
.grid-menu{display:grid;grid-template-columns:1fr;gap:12px}.tile{text-align:left;border:0;border-radius:24px;padding:18px;background:#fff;box-shadow:0 18px 48px rgba(15,23,42,.10);color:var(--blue);font-weight:950}.tile span{display:inline-block;font-size:30px;margin-right:10px}.tile small{display:block;color:var(--muted);font-weight:800;margin-top:8px}
.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-top:1px solid rgba(148,163,184,.26);display:flex;gap:6px;overflow-x:auto;padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:30}
.tabs button{border:0;background:transparent;border-radius:16px;padding:9px 12px;color:var(--muted);font-size:12px;font-weight:950;white-space:nowrap;min-width:max-content}.tabs button.active{background:linear-gradient(135deg,rgba(37,99,235,.13),rgba(56,189,248,.13));color:var(--blue)}
.title{font-weight:950;color:#071f3e}.sub{font-size:12px;color:var(--muted);font-weight:700;margin-top:4px}.badge{display:inline-flex;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:950;border:1px solid #cbd5e1;background:#eef6ff;color:#0b2f5b;margin:2px}.b-red{background:#fee2e2;color:#991b1b;border-color:#fecaca}.b-green{background:#dcfce7;color:#166534;border-color:#bbf7d0}.b-yellow{background:#fff7ed;color:#9a3412;border-color:#fed7aa}
.actions{display:grid;gap:10px;margin-top:12px}.actions.two{grid-template-columns:1fr 1fr}.empty{padding:18px;border-radius:18px;background:#f8fbff;color:var(--muted);font-weight:800;text-align:center}
.item{border-left:3px solid var(--blue2);padding:12px;margin-bottom:10px;background:#f8fbff;border-radius:12px}.photo{width:64px;height:64px;border-radius:18px;object-fit:cover;background:#eef4fb}.worker{display:grid;grid-template-columns:74px 1fr;gap:12px;align-items:center}
a{color:#2563eb;font-weight:900;text-decoration:none}
</style>

<section id="vnaFormView" class="hidden">

    <h2 style="margin-top:0">Nuevo Ticket Atendedor</h2>
    <label>Atendedor</label><select id="ticketAtendedor"></select>
    <label>Tipo</label><select id="ticketTipo"><option>Ropa / Uniforme</option><option>Vacaciones</option><option>Día de permiso</option><option>Cambio de turno</option><option>Certificado / Documento</option><option>Capacitación</option><option>Pago / remuneración</option><option>Otro</option></select>

<section id="nominaView" class="hidden">

    <button data-create-action class="primary" onclick="showWorkerForm()">Agregar atendedor</button>

    <label>Acción / seguimiento</label><textarea id="noteAccion" placeholder="Compromiso, retroalimentación o seguimiento"></textarea>
    <label>Respaldo: foto o archivo</label><input id="noteArchivo" type="file" accept=".jpg,.jpeg,.png,.webp,.pdf,image/*,.xlsx,.xls" capture="environment"/>

  <div class="actions two"><button class="secondary" onclick="loadNotas()">Actualizar</button><select id="noteFilter" onchange="renderNotas()"><option>Todas</option><option>Positiva</option><option>Negativa</option></select></div>

</main>

<nav class="tabs">
  <button id="tabHome" class="active" onclick="showView('homeView')">Inicio</button>
  <button id="tabSec" onclick="showView('secView')">SEC</button>
  <button id="tabBit" onclick="showView('bitView')">Bitácora</button>
  <button id="tabVna" onclick="showView('vnaView')">VNA</button>
  <button id="tabTicket" onclick="showView('ticketView')">Tickets</button>
  <button id="tabNomina" onclick="showView('nominaView')">Nómina</button>
  <button id="tabNotas" onclick="showView('notasView')">Anotaciones</button>
</nav>
</section>

<script>
const SUPABASE_URL='https://emyskqnsyspzjrguycjk.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVteXNrcW5zeXNwempyZ3V5Y2prIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MDg5NDcsImV4cCI6MjA5NTQ4NDk0N30.bLCSwgLCop1Gg4rCbunFe4YCP_KHxIIFGF28vR0XD-0';
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const bucket='documentos-sec';
let currentUser=null,docs=[],bits=[],bitHist=[],vnas=[],vnaHist=[],tickets=[],ticketHist=[],workers=[],notes=[],selectedDoc=null,selectedVna=null,selectedTicket=null;


function permHas(group,key){
  const p=currentUser?.permisos||{};
  const g=p[group];
  if(Array.isArray(g))return g.includes(key);
  if(g&&typeof g==='object')return !!g[key];
  return !!p[key];
}
function hasPlatform(p){return permHas('plataformas',p)}
function hasModule(m){
  if(m==='ticket_atendedor')return permHas('modulos','ticket_atendedor')||permHas('modulos','ticket');
  return permHas('modulos',m);
}
function canAction(a){return permHas('acciones',a)}
function saveSession(){
  if(currentUser)localStorage.setItem('valepac_admin_mobile_session',JSON.stringify(currentUser));
}
function clearSession(){
  localStorage.removeItem('valepac_admin_mobile_session');
}
function restoreSession(){
  try{
    const raw=localStorage.getItem('valepac_admin_mobile_session');
    if(!raw)return false;
    currentUser=JSON.parse(raw);
    login.classList.add('hidden');
    app.classList.remove('hidden');
    applyPermissions();
    loadAll();
    return true;
  }catch(e){
    clearSession();
    return false;
  }
}
async function loginApp(){
  const u=(loginUser.value||'').trim().toLowerCase();
  const p=(loginPass.value||'').trim();
  const {data:user,error}=await client.from('usuarios_portal').select('*').eq('usuario',u).eq('estado','Activo').maybeSingle();
  if(error){
    loginMsg.innerHTML='<div class="msg error">'+error.message+'</div>';
    return;
  }
  if(user && p===user.password){
    currentUser={usuario:user.usuario,nombre:user.nombre||user.usuario,rol:user.rol,permisos:user.permisos||{}};
    const hasAnyMobileModule=hasModule('sec')||hasModule('bitacora')||hasModule('vna')||hasModule('ticket_atendedor')||hasModule('nomina')||hasModule('historial_anotaciones');
    if(hasPlatform('admin_mobile') && hasAnyMobileModule){
      saveSession();
      login.classList.add('hidden');
      app.classList.remove('hidden');
      applyPermissions();
      loadAll();
      return;
    }
  }
  loginMsg.innerHTML='<div class="msg error">Usuario sin permiso o contraseña incorrecta.</div>';
}
function logout(){clearSession();location.reload()}
function fmt(d){if(!d)return'-';return new Date(d).toLocaleString('es-CL',{dateStyle:'short',timeStyle:'short'})}
function safeFileName(n){return String(n||'archivo').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9._-]/g,'_')}
function msg(el,t,c='ok'){el.innerHTML=`<div class="msg ${c}">${t}</div>`}
function badge(s){let c='';if(['Alta','Negativa'].includes(s))c=' b-red';if(['Positiva','Atendido','Cerrado','Activo'].includes(s))c=' b-green';if(['Media','En seguimiento'].includes(s))c=' b-yellow';return `<span class="badge${c}">${s||'-'}</span>`}


function applyPermissions(){
  const map={
    sec:hasModule('sec'),
    bitacora:hasModule('bitacora'),
    vna:hasModule('vna'),
    ticket_atendedor:hasModule('ticket_atendedor'),
    nomina:hasModule('nomina'),
    historial_anotaciones:hasModule('historial_anotaciones')
  };
  if(tabSec)tabSec.style.display=map.sec?'block':'none';
  if(tabBit)tabBit.style.display=map.bitacora?'block':'none';
  if(tabVna)tabVna.style.display=map.vna?'block':'none';
  if(tabTicket)tabTicket.style.display=map.ticket_atendedor?'block':'none';
  if(tabNomina)tabNomina.style.display=map.nomina?'block':'none';
  if(tabNotas)tabNotas.style.display=map.historial_anotaciones?'block':'none';
  document.querySelectorAll('[data-module]').forEach(el=>{
    const mod=el.dataset.module;
    el.style.display=map[mod]?'block':'none';
  });
  const canCreate=canAction('crear');
  document.querySelectorAll('[data-create-action]').forEach(el=>el.style.display=canCreate?'block':'none');
  const userPill=document.querySelector('.user');
  if(userPill)userPill.textContent=(currentUser?.nombre||currentUser?.usuario||'Usuario')+' · Salir';
}

async function loadAll(){
  const jobs=[];
  if(hasModule('sec'))jobs.push(loadSecDocs());
  if(hasModule('bitacora'))jobs.push(loadBitacora());
  if(hasModule('vna'))jobs.push(loadVna());
  if(hasModule('ticket_atendedor'))jobs.push(loadTickets());
  if(hasModule('nomina')||hasModule('ticket_atendedor')||hasModule('historial_anotaciones'))jobs.push(loadNomina());
  if(hasModule('historial_anotaciones'))jobs.push(loadNotas());
  await Promise.allSettled(jobs);
  renderHome();
}
function renderHome(){
  if(document.getElementById('kSec'))kSec.textContent=docs.length;
  if(document.getElementById('kBit'))kBit.textContent=bits.length;
  if(document.getElementById('kVna'))kVna.textContent=vnas.length;
  if(document.getElementById('kTickets'))kTickets.textContent=tickets.filter(t=>t.estado!=='Atendido').length;
  if(document.getElementById('kAt'))kAt.textContent=workers.filter(w=>(w.estado||'Activo')==='Activo').length;
  if(document.getElementById('kNotas'))kNotas.textContent=notes.length;
}
function showView(id){
  const map={secView:'sec',secDetailView:'sec',bitView:'bitacora',bitFormView:'bitacora',bitDetailView:'bitacora',vnaView:'vna',vnaFormView:'vna',vnaDetailView:'vna',ticketView:'ticket_atendedor',ticketFormView:'ticket_atendedor',ticketDetailView:'ticket_atendedor',nominaView:'nomina',workerFormView:'nomina',noteFormView:'historial_anotaciones',workerDetailView:'nomina',notasView:'historial_anotaciones'};
  if(map[id]&&!hasModule(map[id])){alert('Usuario sin acceso a este módulo.');return;}
  ['homeView','secView','secDetailView','bitView','bitFormView','bitDetailView','vnaView','vnaFormView','vnaDetailView','ticketView','ticketFormView','ticketDetailView','nominaView','workerFormView','noteFormView','workerDetailView','notasView'].forEach(v=>document.getElementById(v)?.classList.add('hidden'));
  document.getElementById(id)?.classList.remove('hidden');
  tabHome?.classList.toggle('active',id==='homeView');
  tabSec?.classList.toggle('active',id.startsWith('sec'));
  tabBit?.classList.toggle('active',id.startsWith('bit'));
  tabVna?.classList.toggle('active',id.startsWith('vna'));
  tabTicket?.classList.toggle('active',id.startsWith('ticket'));
  tabNomina?.classList.toggle('active',id==='nominaView'||id==='workerDetailView');
  tabNotas?.classList.toggle('active',id==='notasView'||id==='noteFormView');
  viewTitle.textContent=id==='homeView'?'VALEPAC Admin':id.startsWith('sec')?'SEC':id.startsWith('bit')?'Bitácora':id.startsWith('vna')?'VNA':id.startsWith('ticket')?'Ticket Atendedor':id==='nominaView'||id==='workerDetailView'?'Nómina de Atendedores':'Historial de Anotaciones';
}

async function loadSecDocs(){
  const {data,error}=await client.from('documentos').select('*').order('numero_indice');
  if(error){secList.innerHTML='<div class="msg error">'+error.message+'</div>';return}
  docs=(data||[]).sort((a,b)=>String(a.numero_indice||'').localeCompare(String(b.numero_indice||''),'es',{numeric:true}));
  renderSecDocs();renderHome();
}
function renderSecDocs(){
  const q=(secSearch?.value||'').toLowerCase();
  const list=docs.filter(d=>`${d.numero_indice||''} ${d.nombre||''} ${d.categoria||''} ${d.estado||''}`.toLowerCase().includes(q));
  secList.innerHTML=list.map(d=>`<div class="card" onclick="openSecDoc(${d.id})"><div class="title">${d.numero_indice||''} · ${d.nombre||'-'}</div><div class="sub">${d.categoria||'-'} · Vence: ${d.fecha_vencimiento||'Sin fecha'}</div><div style="margin-top:8px">${badge(d.estado)}</div></div>`).join('')||'<div class="empty">Sin documentos.</div>';

function openSecDoc(id){
  selectedDoc=docs.find(d=>d.id===id); if(!selectedDoc)return;

function daysLeft(d){if(!d)return null;const a=new Date();a.setHours(0,0,0,0);const b=new Date(d);b.setHours(0,0,0,0);return Math.ceil((b-a)/86400000)}
function calcDocStatus(d,alertDays,hasFile){if(!hasFile)return 'No cargado';if(!d)return 'En Proceso';const rest=daysLeft(d);if(rest<0)return 'Vencido';if(rest<=Number(alertDays||30))return 'Por vencer';return 'Vigente'}
async function uploadSecPdf(id){
  if(!canAction('subir_archivos')){msg(secMsg,'Usuario sin permiso para subir archivos.','error');return}
  const file=secPdf.files[0], due=secDue.value, alertDays=secAlert.value||30;
  if(!file||!due){msg(secMsg,'Selecciona PDF y fecha de vencimiento.','error');return}
  const path=`sec/mobile/${id}_${Date.now()}_${safeFileName(file.name)}`;
  const up=await client.storage.from(bucket).upload(path,file,{upsert:true});
  if(up.error){msg(secMsg,up.error.message,'error');return}
  const url=client.storage.from(bucket).getPublicUrl(path).data.publicUrl;
  const estado=calcDocStatus(due,alertDays,true),rest=daysLeft(due);
  const {error}=await client.from('documentos').update({archivo_url:url,archivo_nombre:file.name,fecha_vencimiento:due,dias_alerta:Number(alertDays),dias_restantes:rest,alerta_activa:estado==='Por vencer'||estado==='Vencido',estado,updated_at:new Date().toISOString()}).eq('id',id);
  if(error){msg(secMsg,error.message,'error');return}
  msg(secMsg,'PDF cargado correctamente.'); await loadSecDocs(); openSecDoc(id);
}

  if(file){
    const path=`desempeno-at/anotaciones-mobile/${Date.now()}_${safeFileName(file.name)}`;
    const up=await client.storage.from(bucket).upload(path,file,{upsert:true});
    if(up.error){msg(noteMsg,up.error.message,'error');return}
    archivo_url=client.storage.from(bucket).getPublicUrl(path).data.publicUrl;
    archivo_nombre=file.name;
  }
  const payload={
    trabajador_id,
    tipo:noteTipo.value,
    fecha_anotacion:noteFecha.value||new Date().toISOString(),
    responsable:currentUser?.nombre||'Usuario',
    titulo,
    categoria:noteCategoria.value,
    detalle:noteDetalle.value,
    accion:noteAccion.value,
    archivo_url,
    archivo_nombre
  };
  const {error}=await client.from('anotaciones_desempeno_at').insert(payload);
  if(error){msg(noteMsg,error.message,'error');return}
  msg(noteMsg,'Anotación guardada correctamente.','ok');
  clearNoteForm();
  await loadNotas();
  await loadNomina();
  setTimeout(()=>showView('notasView'),500);
}

/* NÓMINA */
async function loadNomina(){
  const {data,error}=await client.from('atendedores_nomina').select('*').order('nombre',{ascending:true});
  if(error){workerList.innerHTML='<div class="msg error">'+error.message+'</div>';return}
  workers=data||[];
  renderNomina();
  fillWorkerSelect();
  try{fillTicketWorkers()}catch(e){}
  renderHome();
}
function renderNomina(){
  const q=(workerSearch?.value||'').toLowerCase();
  const list=workers.filter(w=>`${w.nombre||''} ${w.rut||''} ${w.estado||'Activo'}`.toLowerCase().includes(q));
  workerList.innerHTML=list.map(w=>`<div class="card worker" onclick="openWorker(${w.id})">${w.foto_url?`<img class="photo" src="${w.foto_url}">`:'<div class="photo"></div>'}<div><div class="title">${w.nombre}</div><div class="sub">${w.rut||'-'} · Ingreso: ${w.fecha_ingreso||'-'}</div><div>${badge(w.estado||'Activo')}</div></div></div>`).join('')||'<div class="empty">Sin atendedores.</div>';
}
function openWorker(id){
  const w=workers.find(x=>x.id===id);
  const wn=notes.filter(n=>n.trabajador_id===id);
  workerDetail.innerHTML=`<div class="card" style="text-align:center">${w.foto_url?`<img class="photo" style="width:130px;height:130px;border-radius:30px" src="${w.foto_url}">`:''}<h2>${w.nombre}</h2><p>${w.rut||'-'}</p><p>Ingreso: ${w.fecha_ingreso||'-'} · ${w.estado||'Activo'}</p></div>
  <div class="card"><h2 style="margin-top:0">Anotaciones del trabajador</h2>${wn.map(n=>`<div class="item"><b>${n.titulo}</b><br>${badge(n.tipo)} <small>${fmt(n.fecha_anotacion)}</small><p>${n.detalle||''}</p></div>`).join('')||'<div class="empty">Sin anotaciones registradas.</div>'}</div>`;
  showView('workerDetailView');
}

/* ANOTACIONES GENERAL */
async function loadNotas(){
  const {data,error}=await client.from('anotaciones_desempeno_at').select('*, atendedores_nomina(nombre,rut,foto_url)').order('fecha_anotacion',{ascending:false});
  if(error){noteList.innerHTML='<div class="msg error">'+error.message+'</div>';return}
  notes=data||[];
  renderNotas();
  fillWorkerSelect();
  renderHome();
}
function renderNotas(){
  const q=(noteSearch?.value||'').toLowerCase();
  const f=noteFilter?.value||'Todas';
  const list=notes.filter(n=>(f==='Todas'||n.tipo===f)&&`${n.titulo||''} ${n.detalle||''} ${n.tipo||''} ${n.atendedores_nomina?.nombre||''} ${n.atendedores_nomina?.rut||''}`.toLowerCase().includes(q));
  noteList.innerHTML=list.map(n=>`<div class="card"><div class="title">${n.titulo||'Anotación'}</div><div class="sub">${n.atendedores_nomina?.nombre||'Trabajador no asignado'} · ${fmt(n.fecha_anotacion)}</div><div style="margin-top:8px">${badge(n.tipo)}</div><p>${n.detalle||''}</p>${n.accion?`<p><b>Acción:</b> ${n.accion}</p>`:''}${n.archivo_url?`<a target="_blank" href="${n.archivo_url}">Ver respaldo</a>`:''}</div>`).join('')||'<div class="empty">Sin anotaciones.</div>';
}

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}))}
window.addEventListener('load',()=>restoreSession());
</script>

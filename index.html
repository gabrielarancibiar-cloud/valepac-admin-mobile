<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>VALEPAC Admin Mobile</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#0b2f5b"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="VALEPAC Admin"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">window.addEventListener('load',()=>restoreSession());
</script>
<style>
:root{--blue:#0b2f5b;--blue2:#2563eb;--cyan:#38bdf8;--bg:#eef4fb;--text:#0f172a;--muted:#64748b;--border:#dbe7f3}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at 8% 8%,rgba(37,99,235,.16),transparent 34%),linear-gradient(135deg,#f8fbff,#eef4fb 60%,#fff);color:var(--text);min-height:100vh}
.hidden{display:none!important}button,input,select,textarea{font:inherit}button{cursor:pointer}textarea{resize:vertical;min-height:96px}
.card{background:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.9);border-radius:24px;padding:18px;margin-bottom:12px;box-shadow:0 18px 48px rgba(15,23,42,.10)}
.login{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:28px;max-width:540px;margin:auto}.brand{font-size:24px;font-weight:950;color:var(--blue);letter-spacing:.6px}.hero h1{font-size:38px;line-height:1;margin:18px 0 10px;color:var(--blue)}.hero p{color:var(--muted);font-weight:700;line-height:1.45}
label{display:block;font-size:12px;color:var(--muted);font-weight:900;margin:10px 0 6px;text-transform:uppercase}
input,select,textarea{width:100%;border:1px solid #cbd5e1;border-radius:16px;padding:14px;background:#fff;color:var(--text)}
.primary{width:100%;border:0;border-radius:18px;padding:15px 18px;background:linear-gradient(135deg,var(--blue2),#0ea5e9);color:#fff;font-weight:950;box-shadow:0 14px 30px rgba(37,99,235,.22)}
.secondary{border:1px solid #cbd5e1;background:#fff;color:var(--blue);border-radius:16px;padding:13px 16px;font-weight:900}
.ghost{border:0;background:#eef6ff;color:var(--blue);border-radius:16px;padding:13px 16px;font-weight:900}
.msg{margin-top:12px;border-radius:16px;padding:12px;font-weight:800}.error{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}
.app{min-height:100vh;padding-bottom:86px}.header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(148,163,184,.25);padding:14px 16px}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:10px}.header h2{margin:0;color:var(--blue);font-size:18px}.header small{display:block;color:var(--muted);font-weight:800;margin-top:3px}.session{display:flex;align-items:center;gap:10px}.session-user{text-align:right;line-height:1.15}.session-user b{display:block;color:var(--blue);font-size:13px}.session-user small{font-size:11px;color:var(--muted);font-weight:900}.logout-btn{border:1px solid #bfdbfe;background:#fff;color:var(--blue2);border-radius:14px;padding:10px 12px;font-weight:950;white-space:nowrap}
.main{padding:16px;max-width:760px;margin:0 auto}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}.kpi{background:#fff;border:1px solid var(--border);border-radius:20px;padding:14px;box-shadow:0 12px 34px rgba(15,23,42,.08)}.kpi small{color:var(--muted);font-weight:900}.kpi b{display:block;font-size:24px;color:var(--blue);margin-top:4px}
.grid-menu{display:grid;grid-template-columns:1fr;gap:12px}.tile{text-align:left;border:0;border-radius:24px;padding:18px;background:#fff;box-shadow:0 18px 48px rgba(15,23,42,.10);color:var(--blue);font-weight:950}.tile span{display:inline-block;font-size:30px;margin-right:10px}.tile small{display:block;color:var(--muted);font-weight:800;margin-top:8px}
.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-top:1px solid rgba(148,163,184,.26);display:grid;grid-template-columns:repeat(4,1fr);padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:30}
.tabs button{border:0;background:transparent;border-radius:16px;padding:9px 4px;color:var(--muted);font-size:12px;font-weight:950}.tabs button.active{background:linear-gradient(135deg,rgba(37,99,235,.13),rgba(56,189,248,.13));color:var(--blue)}
.title{font-weight:950;color:#071f3e}.sub{font-size:12px;color:var(--muted);font-weight:700;margin-top:4px}.badge{display:inline-flex;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:950;border:1px solid #cbd5e1;background:#eef6ff;color:#0b2f5b;margin:2px}.b-red{background:#fee2e2;color:#991b1b;border-color:#fecaca}.b-green{background:#dcfce7;color:#166534;border-color:#bbf7d0}.b-yellow{background:#fff7ed;color:#9a3412;border-color:#fed7aa}
.actions{display:grid;gap:10px;margin-top:12px}.actions.two{grid-template-columns:1fr 1fr}.empty{padding:18px;border-radius:18px;background:#f8fbff;color:var(--muted);font-weight:800;text-align:center}
.item{border-left:3px solid var(--blue2);padding:12px;margin-bottom:10px;background:#f8fbff;border-radius:12px}.photo{width:64px;height:64px;border-radius:18px;object-fit:cover;background:#eef4fb}.worker{display:grid;grid-template-columns:74px 1fr;gap:12px;align-items:center}
a{color:#2563eb;font-weight:900;text-decoration:none}
</style>
</head>
<body>
<section id="login" class="login">
  <div class="brand">VALEPAC · EDS 40098</div>
  <div class="hero">
    <h1>Admin Mobile</h1>
    <p>Admin Mobile sincronizado con permisos VALEPAC: Bitácora, Nómina e Historial de Anotaciones.</p>
  </div>
  <div class="card">
    <label>Usuario</label>
    <input id="loginUser" placeholder="Escriba su usuario"/>
    <label>Contraseña</label>
    <input id="loginPass" type="password" placeholder="Escriba su contraseña"/>
    <div style="height:14px"></div>
    <button class="primary" onclick="loginApp()">Ingresar</button>
    <div id="loginMsg"></div>
  </div>
</section>

<section id="app" class="app hidden">
<header class="header">
  <div class="header-row">
    <div><h2 id="viewTitle">VALEPAC Admin</h2><small id="viewSub">Mobile v1</small></div>
    <div class="session">
      <div class="session-user"><b id="sessionName">Usuario</b><small id="sessionRole">Rol</small></div>
      <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>
</header>

<main class="main">
<section id="homeView">
  <div class="kpis">
    <div class="kpi"><small>Eventos abiertos</small><b id="kBit">0</b></div>
    <div class="kpi"><small>Atendedores</small><b id="kAt">0</b></div>
    <div class="kpi"><small>Anotaciones</small><b id="kNotas">0</b></div>
  </div>
  <div class="grid-menu">
    <button class="tile" onclick="showView('bitView')"><span>📝</span>Bitácora <small>Eventos, seguimiento, archivos y estado.</small></button>
    <button class="tile" onclick="showView('nominaView')"><span>👥</span>Nómina de Atendedores <small>Ficha, foto, estado e historial individual.</small></button>
    <button class="tile" onclick="showView('notasView')"><span>📌</span>Historial de Anotaciones <small>Vista general de positivas y negativas.</small></button>
  </div>
</section>

<section id="bitView" class="hidden">
  <div class="actions two"><button data-create-action class="primary" onclick="showBitForm()">Nuevo evento</button><button class="secondary" onclick="loadBitacora()">Actualizar</button></div>
  <div id="bitList" style="margin-top:14px"></div>
</section>

<section id="bitFormView" class="hidden">
  <div class="card">
    <h2 style="margin-top:0">Nuevo evento</h2>
    <label>Título</label><input id="bitTitulo"/>
    <label>Categoría</label><select id="bitCategoria"><option>Operación</option><option>Seguridad</option><option>Mantención</option><option>Cliente</option><option>Fiscalización</option><option>Personal</option><option>Otro</option></select>
    <label>Gravedad</label><select id="bitGravedad"><option>Baja</option><option>Media</option><option>Alta</option></select>
    <label>Estado</label><select id="bitEstado"><option>Abierto</option><option>En seguimiento</option><option>Cerrado</option><option>Atendido</option></select>
    <label>Descripción</label><textarea id="bitDescripcion"></textarea>
    <label>Archivo / foto</label><input id="bitArchivo" type="file" accept=".jpg,.jpeg,.png,.webp,.pdf,image/*,.xlsx,.xls" capture="environment"/>
    <button class="primary" onclick="createBitacora()">Guardar evento</button>
    <div id="bitMsg"></div>
  </div>
</section>

<section id="bitDetailView" class="hidden"><div id="bitDetail"></div></section>

<section id="nominaView" class="hidden">
  <div class="actions two">
    <button data-create-action class="primary" onclick="showWorkerForm()">Agregar atendedor</button>
    <button data-create-action class="secondary" onclick="showNoteForm()">Nueva anotación</button>
  </div>
  <div class="actions two">
    <button class="secondary" onclick="loadNomina()">Actualizar</button>
    <button class="ghost" onclick="showView('homeView')">Inicio</button>
  </div>
  <input id="workerSearch" placeholder="Buscar atendedor" oninput="renderNomina()" style="margin:14px 0"/>
  <div id="workerList"></div>
</section>

<section id="workerFormView" class="hidden">
  <div class="card">
    <h2 style="margin-top:0">Agregar atendedor</h2>
    <label>Nombre</label><input id="workerNombre" placeholder="Nombre completo"/>
    <label>RUT</label><input id="workerRut" placeholder="12.345.678-9"/>
    <label>Fecha ingreso EDS</label><input id="workerFechaIngreso" type="date"/>
    <label>Foto</label><input id="workerFoto" type="file" accept=".jpg,.jpeg,.png,.webp,image/*" capture="environment"/>
    <button class="primary" onclick="createWorker()">Guardar atendedor</button>
    <button class="secondary" onclick="clearWorkerForm()" style="margin-top:10px;width:100%">Limpiar campos</button>
    <div id="workerMsg"></div>
  </div>
</section>

<section id="noteFormView" class="hidden">
  <div class="card">
    <h2 style="margin-top:0">Nueva anotación</h2>
    <label>Trabajador</label><select id="noteTrabajador"></select>
    <label>Tipo</label><select id="noteTipo"><option>Positiva</option><option>Negativa</option></select>
    <label>Fecha y hora</label><input id="noteFecha" type="datetime-local"/>
    <label>Título</label><input id="noteTitulo" placeholder="Ej: Excelente protocolo de atención"/>
    <label>Categoría</label><select id="noteCategoria"><option>Protocolo de atención</option><option>Servicio al cliente</option><option>Presentación personal</option><option>Puntualidad</option><option>Trabajo en equipo</option><option>Seguridad</option><option>Operación</option><option>Otro</option></select>
    <label>Detalle</label><textarea id="noteDetalle" placeholder="Describe la situación de forma objetiva"></textarea>
    <label>Acción / seguimiento</label><textarea id="noteAccion" placeholder="Compromiso, retroalimentación o seguimiento"></textarea>
    <label>Respaldo: foto o archivo</label><input id="noteArchivo" type="file" accept=".jpg,.jpeg,.png,.webp,.pdf,image/*,.xlsx,.xls" capture="environment"/>
    <button class="primary" onclick="createNote()">Guardar anotación</button>
    <button class="secondary" onclick="clearNoteForm()" style="margin-top:10px;width:100%">Limpiar campos</button>
    <div id="noteMsg"></div>
  </div>
</section>

<section id="workerDetailView" class="hidden"><div id="workerDetail"></div></section>

<section id="notasView" class="hidden">
  <div class="actions two"><button class="secondary" onclick="loadNotas()">Actualizar</button><select id="noteFilter" onchange="renderNotas()"><option>Todas</option><option>Positiva</option><option>Negativa</option></select></div>
  <input id="noteSearch" placeholder="Buscar por trabajador o texto" oninput="renderNotas()" style="margin:14px 0"/>
  <div id="noteList"></div>
</section>
</main>

<nav class="tabs">
  <button id="tabHome" class="active" onclick="showView('homeView')">Inicio</button>
  <button id="tabBit" onclick="showView('bitView')">Bitácora</button>
  <button id="tabNomina" onclick="showView('nominaView')">Nómina</button>
  <button id="tabNotas" onclick="showView('notasView')">Anotaciones</button>
</nav>
</section>

<script>
const SUPABASE_URL='https://emyskqnsyspzjrguycjk.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVteXNrcW5zeXNwempyZ3V5Y2prIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MDg5NDcsImV4cCI6MjA5NTQ4NDk0N30.bLCSwgLCop1Gg4rCbunFe4YCP_KHxIIFGF28vR0XD-0';
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const bucket='documentos-sec';
let currentUser=null,bits=[],bitHist=[],workers=[],notes=[];


function permListAllows(container,key){
  if(!container)return false;
  if(Array.isArray(container))return container.includes(key);
  return !!container[key];
}
function normalizeRoleName(role){
  const r=String(role||'').toLowerCase();
  if(r==='admin'||r==='administrador')return 'Administrador';
  if(r==='supervisor')return 'Supervisor';
  if(r==='consulta')return 'Consulta';
  if(r==='atendedor')return 'Atendedor';
  return role||'-';
}
function hasPlatform(p){
  if(!currentUser)return false;
  const permisos=currentUser.permisos||{};
  if(currentUser.usuario==='gabrielarancibia')return true;
  return permListAllows(permisos.plataformas,p) || permListAllows(permisos,p);
}
function hasModule(m){
  if(!currentUser)return false;
  const permisos=currentUser.permisos||{};
  if(currentUser.usuario==='gabrielarancibia')return true;
  return permListAllows(permisos.modulos,m) || permListAllows(permisos,m);
}
function canAction(a){
  if(!currentUser)return false;
  const permisos=currentUser.permisos||{};
  if(currentUser.usuario==='gabrielarancibia')return true;
  return permListAllows(permisos.acciones,a) || permListAllows(permisos,a);
}
function saveSession(){
  if(currentUser)localStorage.setItem('valepac_admin_mobile_session',JSON.stringify(currentUser));
}
function clearSession(){
  localStorage.removeItem('valepac_admin_mobile_session');
}
function restoreSession(){
  try{
    const raw=localStorage.getItem('valepac_admin_mobile_session');
    if(!raw)return false;
    currentUser=JSON.parse(raw);
    login.classList.add('hidden');
    app.classList.remove('hidden');
    applyPermissions();
    loadAll();
    return true;
  }catch(e){
    clearSession();
    return false;
  }
}
async function loginApp(){
  const u=(loginUser.value||'').trim().toLowerCase();
  const p=(loginPass.value||'').trim();
  const {data:user,error}=await client.from('usuarios_portal').select('*').eq('usuario',u).eq('estado','Activo').maybeSingle();
  if(error){
    loginMsg.innerHTML='<div class="msg error">'+error.message+'</div>';
    return;
  }
  if(user && p===user.password){
    currentUser={usuario:user.usuario,nombre:user.nombre||user.usuario,rol:user.rol,permisos:user.permisos||{}};
    const hasAnyMobileModule=hasModule('bitacora')||hasModule('nomina')||hasModule('historial_anotaciones');
    if(hasPlatform('admin_mobile') && hasAnyMobileModule){
      saveSession();
      login.classList.add('hidden');
      app.classList.remove('hidden');
      applyPermissions();
      loadAll();
      return;
    }
  }
  loginMsg.innerHTML='<div class="msg error">Usuario sin permiso o contraseña incorrecta.</div>';
}
function logout(){clearSession();location.reload()}
function fmt(d){if(!d)return'-';return new Date(d).toLocaleString('es-CL',{dateStyle:'short',timeStyle:'short'})}
function safeFileName(n){return String(n||'archivo').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9._-]/g,'_')}
function msg(el,t,c='ok'){el.innerHTML=`<div class="msg ${c}">${t}</div>`}
function badge(s){let c='';if(['Alta','Negativa'].includes(s))c=' b-red';if(['Positiva','Atendido','Cerrado','Activo'].includes(s))c=' b-green';if(['Media','En seguimiento'].includes(s))c=' b-yellow';return `<span class="badge${c}">${s||'-'}</span>`}


function applyPermissions(){
  if(document.getElementById('sessionName'))sessionName.textContent=currentUser?.nombre||currentUser?.usuario||'Usuario';
  if(document.getElementById('sessionRole'))sessionRole.textContent=normalizeRoleName(currentUser?.rol);
  const bitAllowed=hasModule('bitacora');
  const nominaAllowed=hasModule('nomina');
  const notasAllowed=hasModule('historial_anotaciones');

  tabBit.style.display=bitAllowed?'block':'none';
  tabNomina.style.display=nominaAllowed?'block':'none';
  tabNotas.style.display=notasAllowed?'block':'none';

  const tiles=document.querySelectorAll('.tile');
  if(tiles[0])tiles[0].style.display=bitAllowed?'block':'none';
  if(tiles[1])tiles[1].style.display=nominaAllowed?'block':'none';
  if(tiles[2])tiles[2].style.display=notasAllowed?'block':'none';

  const canCreate=canAction('crear');
  document.querySelectorAll('[data-create-action]').forEach(el=>el.style.display=canCreate?'block':'none');
}

async function loadAll(){const jobs=[];if(hasModule('bitacora'))jobs.push(loadBitacora());if(hasModule('nomina'))jobs.push(loadNomina());if(hasModule('historial_anotaciones'))jobs.push(loadNotas());await Promise.allSettled(jobs);renderHome()}
function renderHome(){
  kBit.textContent=bits.filter(b=>!['Cerrado','Atendido'].includes(b.estado)).length;
  kAt.textContent=workers.filter(w=>(w.estado||'Activo')==='Activo').length;
  kNotas.textContent=notes.length;
}
function showView(id){const map={bitView:'bitacora',bitFormView:'bitacora',bitDetailView:'bitacora',nominaView:'nomina',workerFormView:'nomina',noteFormView:'historial_anotaciones',workerDetailView:'nomina',notasView:'historial_anotaciones'};if(map[id]&&!hasModule(map[id])){alert('Usuario sin acceso a este módulo.');return;}
  ['homeView','bitView','bitFormView','bitDetailView','nominaView','workerFormView','noteFormView','workerDetailView','notasView'].forEach(v=>document.getElementById(v).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  tabHome.classList.toggle('active',id==='homeView');
  tabBit.classList.toggle('active',id.startsWith('bit'));
  tabNomina.classList.toggle('active',id==='nominaView'||id==='workerDetailView');
  tabNotas.classList.toggle('active',id==='notasView');
  viewTitle.textContent=id==='homeView'?'VALEPAC Admin':id.startsWith('bit')?'Bitácora':id==='nominaView'||id==='workerDetailView'?'Nómina de Atendedores':'Historial de Anotaciones';
}

/* BITÁCORA */
async function loadBitacora(){
  const {data,error}=await client.from('bitacora_eventos').select('*').order('fecha_evento',{ascending:false});
  if(error){bitList.innerHTML='<div class="msg error">'+error.message+'</div>';return}
  bits=data||[];
  renderBitList();
  renderHome();
}
function renderBitList(){
  bitList.innerHTML=bits.map(b=>`<div class="card" onclick="openBit(${b.id})"><div class="title">${b.titulo}</div><div class="sub">${b.categoria||'-'} · ${fmt(b.fecha_evento)}</div><div style="margin-top:8px">${badge(b.gravedad)} ${badge(b.estado)}</div></div>`).join('')||'<div class="empty">Sin eventos.</div>';
}
function showBitForm(){
  showView('bitFormView');
  bitTitulo.value='';
  bitDescripcion.value='';
  bitArchivo.value='';
  bitEstado.value='Abierto';
  bitGravedad.value='Baja';
}
async function createBitacora(){if(!canAction('crear')){msg(bitMsg,'Usuario sin permiso para crear.','error');return;}
  let archivo_url=null,archivo_nombre=null;
  const file=bitArchivo.files[0];
  if(file){
    const path=`bitacora/admin-mobile/${Date.now()}_${safeFileName(file.name)}`;
    const up=await client.storage.from(bucket).upload(path,file,{upsert:true});
    if(up.error){msg(bitMsg,up.error.message,'error');return}
    archivo_url=client.storage.from(bucket).getPublicUrl(path).data.publicUrl;
    archivo_nombre=file.name;
  }
  const payload={fecha_evento:new Date().toISOString(),titulo:bitTitulo.value.trim(),categoria:bitCategoria.value,gravedad:bitGravedad.value,estado:bitEstado.value,responsable:currentUser.nombre,descripcion:bitDescripcion.value,archivo_url,archivo_nombre};
  if(!payload.titulo){msg(bitMsg,'Falta título.','error');return}
  const {error}=await client.from('bitacora_eventos').insert(payload);
  if(error){msg(bitMsg,error.message,'error');return}
  msg(bitMsg,'Evento guardado.','ok');
  await loadBitacora();
  setTimeout(()=>showView('bitView'),500);
}
async function openBit(id){
  const b=bits.find(x=>x.id===id);
  const {data}=await client.from('historial_bitacora_eventos').select('*').eq('evento_id',id).order('created_at',{ascending:false});
  bitHist=data||[];
  bitDetail.innerHTML=`<div class="card"><h2 style="margin-top:0">${b.titulo}</h2>${badge(b.gravedad)} ${badge(b.estado)}<p><b>Categoría:</b> ${b.categoria||'-'}</p><p><b>Descripción:</b><br>${b.descripcion||'-'}</p>${b.archivo_url?`<a target="_blank" href="${b.archivo_url}">Ver archivo inicial</a>`:''}</div>
  <div class="card"><h2 style="margin-top:0">Agregar seguimiento</h2><label>Comentario</label><textarea id="bitCom"></textarea><label>Estado</label><select id="bitNewEstado"><option>Abierto</option><option>En seguimiento</option><option>Cerrado</option><option>Atendido</option></select><label>Archivo/foto</label><input id="bitHistFile" type="file" accept=".jpg,.jpeg,.png,.webp,.pdf,image/*,.xlsx,.xls" capture="environment"/><button class="primary" onclick="addBitHist(${id})">Agregar seguimiento</button><div id="bitHistMsg"></div></div>
  <div class="card"><h2 style="margin-top:0">Historial</h2>${bitHist.map(h=>`<div class="item"><b>${h.accion||'Seguimiento'}</b><br><small>${fmt(h.created_at)} · ${h.usuario||'-'} ${h.estado?`· ${h.estado}`:''}</small><p>${h.comentario||''}</p>${h.archivo_url?`<a target="_blank" href="${h.archivo_url}">Ver archivo</a>`:''}</div>`).join('')||'<div class="empty">Sin historial posterior.</div>'}</div>`;
  bitNewEstado.value=b.estado||'Abierto';
  showView('bitDetailView');
}
async function addBitHist(id){if(!canAction('crear')){msg(bitHistMsg,'Usuario sin permiso para agregar seguimiento.','error');return;}
  let archivo_url=null,archivo_nombre=null;
  const file=bitHistFile.files[0];
  if(file){
    const path=`bitacora/admin-mobile-hist/${id}/${Date.now()}_${safeFileName(file.name)}`;
    const up=await client.storage.from(bucket).upload(path,file,{upsert:true});
    if(up.error){msg(bitHistMsg,up.error.message,'error');return}
    archivo_url=client.storage.from(bucket).getPublicUrl(path).data.publicUrl;
    archivo_nombre=file.name;
  }
  const estado=bitNewEstado.value;
  const {error}=await client.from('historial_bitacora_eventos').insert({evento_id:id,accion:'Seguimiento admin mobile',usuario:currentUser.nombre,estado,comentario:bitCom.value,archivo_url,archivo_nombre});
  if(error){msg(bitHistMsg,error.message,'error');return}
  await client.from('bitacora_eventos').update({estado}).eq('id',id);
  await loadBitacora();
  await openBit(id);
}


function fillWorkerSelect(){
  if(!document.getElementById('noteTrabajador'))return;
  noteTrabajador.innerHTML='<option value="">Seleccionar trabajador</option>'+workers.filter(w=>(w.estado||'Activo')==='Activo').map(w=>`<option value="${w.id}">${w.nombre} · ${w.rut||''}</option>`).join('');
}
function showWorkerForm(){
  if(!canAction('crear')){alert('Usuario sin permiso para crear.');return}
  clearWorkerForm();
  showView('workerFormView');
}
function clearWorkerForm(){
  workerNombre.value='';
  workerRut.value='';
  workerFechaIngreso.value='';
  workerFoto.value='';
  workerMsg.innerHTML='';
}
async function createWorker(){
  if(!canAction('crear')){msg(workerMsg,'Usuario sin permiso para crear.','error');return}
  const nombre=workerNombre.value.trim();
  const rut=workerRut.value.trim();
  if(!nombre||!rut){msg(workerMsg,'Falta nombre o RUT.','error');return}
  let foto_url=null,foto_nombre=null;
  const file=workerFoto.files[0];
  if(file){
    const path=`desempeno-at/nomina-mobile/${Date.now()}_${safeFileName(file.name)}`;
    const up=await client.storage.from(bucket).upload(path,file,{upsert:true});
    if(up.error){msg(workerMsg,up.error.message,'error');return}
    foto_url=client.storage.from(bucket).getPublicUrl(path).data.publicUrl;
    foto_nombre=file.name;
  }
  const payload={nombre,rut,fecha_ingreso:workerFechaIngreso.value||null,foto_url,foto_nombre,estado:'Activo',updated_at:new Date().toISOString()};
  const {error}=await client.from('atendedores_nomina').insert(payload);
  if(error){msg(workerMsg,error.message,'error');return}
  msg(workerMsg,'Atendedor guardado correctamente.','ok');
  clearWorkerForm();
  await loadNomina();
  setTimeout(()=>showView('nominaView'),500);
}
function showNoteForm(){
  if(!canAction('crear')){alert('Usuario sin permiso para crear.');return}
  clearNoteForm();
  fillWorkerSelect();
  showView('noteFormView');
}
function clearNoteForm(){
  fillWorkerSelect();
  noteTrabajador.value='';
  noteTipo.value='Positiva';
  noteFecha.value='';
  noteTitulo.value='';
  noteCategoria.value='Protocolo de atención';
  noteDetalle.value='';
  noteAccion.value='';
  noteArchivo.value='';
  noteMsg.innerHTML='';
}
async function createNote(){
  if(!canAction('crear')){msg(noteMsg,'Usuario sin permiso para crear.','error');return}
  const trabajador_id=noteTrabajador.value;
  const titulo=noteTitulo.value.trim();
  if(!trabajador_id||!titulo){msg(noteMsg,'Falta trabajador o título.','error');return}
  let archivo_url=null,archivo_nombre=null;
  const file=noteArchivo.files[0];
  if(file){
    const path=`desempeno-at/anotaciones-mobile/${Date.now()}_${safeFileName(file.name)}`;
    const up=await client.storage.from(bucket).upload(path,file,{upsert:true});
    if(up.error){msg(noteMsg,up.error.message,'error');return}
    archivo_url=client.storage.from(bucket).getPublicUrl(path).data.publicUrl;
    archivo_nombre=file.name;
  }
  const payload={
    trabajador_id,
    tipo:noteTipo.value,
    fecha_anotacion:noteFecha.value||new Date().toISOString(),
    responsable:currentUser?.nombre||'Usuario',
    titulo,
    categoria:noteCategoria.value,
    detalle:noteDetalle.value,
    accion:noteAccion.value,
    archivo_url,
    archivo_nombre
  };
  const {error}=await client.from('anotaciones_desempeno_at').insert(payload);
  if(error){msg(noteMsg,error.message,'error');return}
  msg(noteMsg,'Anotación guardada correctamente.','ok');
  clearNoteForm();
  await loadNotas();
  await loadNomina();
  setTimeout(()=>showView('notasView'),500);
}

/* NÓMINA */
async function loadNomina(){
  const {data,error}=await client.from('atendedores_nomina').select('*').order('nombre',{ascending:true});
  if(error){workerList.innerHTML='<div class="msg error">'+error.message+'</div>';return}
  workers=data||[];
  renderNomina();
  fillWorkerSelect();
  renderHome();
}
function renderNomina(){
  const q=(workerSearch?.value||'').toLowerCase();
  const list=workers.filter(w=>`${w.nombre||''} ${w.rut||''} ${w.estado||'Activo'}`.toLowerCase().includes(q));
  workerList.innerHTML=list.map(w=>`<div class="card worker" onclick="openWorker(${w.id})">${w.foto_url?`<img class="photo" src="${w.foto_url}">`:'<div class="photo"></div>'}<div><div class="title">${w.nombre}</div><div class="sub">${w.rut||'-'} · Ingreso: ${w.fecha_ingreso||'-'}</div><div>${badge(w.estado||'Activo')}</div></div></div>`).join('')||'<div class="empty">Sin atendedores.</div>';
}
function openWorker(id){
  const w=workers.find(x=>x.id===id);
  const wn=notes.filter(n=>n.trabajador_id===id);
  workerDetail.innerHTML=`<div class="card" style="text-align:center">${w.foto_url?`<img class="photo" style="width:130px;height:130px;border-radius:30px" src="${w.foto_url}">`:''}<h2>${w.nombre}</h2><p>${w.rut||'-'}</p><p>Ingreso: ${w.fecha_ingreso||'-'} · ${w.estado||'Activo'}</p></div>
  <div class="card"><h2 style="margin-top:0">Anotaciones del trabajador</h2>${wn.map(n=>`<div class="item"><b>${n.titulo}</b><br>${badge(n.tipo)} <small>${fmt(n.fecha_anotacion)}</small><p>${n.detalle||''}</p></div>`).join('')||'<div class="empty">Sin anotaciones registradas.</div>'}</div>`;
  showView('workerDetailView');
}

/* ANOTACIONES GENERAL */
async function loadNotas(){
  const {data,error}=await client.from('anotaciones_desempeno_at').select('*, atendedores_nomina(nombre,rut,foto_url)').order('fecha_anotacion',{ascending:false});
  if(error){noteList.innerHTML='<div class="msg error">'+error.message+'</div>';return}
  notes=data||[];
  renderNotas();
  fillWorkerSelect();
  renderHome();
}
function renderNotas(){
  const q=(noteSearch?.value||'').toLowerCase();
  const f=noteFilter?.value||'Todas';
  const list=notes.filter(n=>(f==='Todas'||n.tipo===f)&&`${n.titulo||''} ${n.detalle||''} ${n.tipo||''} ${n.atendedores_nomina?.nombre||''} ${n.atendedores_nomina?.rut||''}`.toLowerCase().includes(q));
  noteList.innerHTML=list.map(n=>`<div class="card"><div class="title">${n.titulo||'Anotación'}</div><div class="sub">${n.atendedores_nomina?.nombre||'Trabajador no asignado'} · ${fmt(n.fecha_anotacion)}</div><div style="margin-top:8px">${badge(n.tipo)}</div><p>${n.detalle||''}</p>${n.accion?`<p><b>Acción:</b> ${n.accion}</p>`:''}${n.archivo_url?`<a target="_blank" href="${n.archivo_url}">Ver respaldo</a>`:''}</div>`).join('')||'<div class="empty">Sin anotaciones.</div>';
}

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}))}
window.addEventListener('load',()=>restoreSession());
</script>

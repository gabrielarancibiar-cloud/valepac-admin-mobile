<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>VALEPAC Admin Mobile</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#0b2f5b"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--blue:#0b2f5b;--blue2:#2563eb;--cyan:#38bdf8;--bg:#eef4fb;--text:#0f172a;--muted:#64748b;--border:#dbe7f3}
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#f8fbff,#eef4fb);color:var(--text);min-height:100vh}.hidden{display:none!important}
button,input,select,textarea{font:inherit}textarea{resize:vertical;min-height:96px}.card{background:#fff;border:1px solid var(--border);border-radius:22px;padding:18px;margin-bottom:12px;box-shadow:0 16px 40px rgba(15,23,42,.08)}
.login{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:28px;max-width:520px;margin:auto}.brand{font-size:24px;font-weight:950;color:var(--blue)}h1,h2{color:var(--blue)}label{display:block;font-size:12px;color:var(--muted);font-weight:900;margin:10px 0 6px;text-transform:uppercase}
input,select,textarea{width:100%;border:1px solid #cbd5e1;border-radius:14px;padding:13px;background:#fff}.primary{width:100%;border:0;border-radius:16px;padding:14px 16px;background:linear-gradient(135deg,var(--blue2),#0ea5e9);color:#fff;font-weight:900}.secondary{border:1px solid #cbd5e1;background:#fff;color:var(--blue);border-radius:16px;padding:12px 14px;font-weight:900}.ghost{border:0;background:#eef6ff;color:var(--blue);border-radius:16px;padding:12px 14px;font-weight:900}
.msg{margin-top:12px;border-radius:14px;padding:12px;font-weight:800}.error{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}.app{min-height:100vh;padding-bottom:86px}.header{position:sticky;top:0;background:#fff;border-bottom:1px solid #dbe7f3;padding:14px 16px;z-index:5}.header-row{display:flex;justify-content:space-between;align-items:center}.header h2{margin:0;font-size:18px}.header small{color:var(--muted);font-weight:800}.user{font-size:12px;background:#eef6ff;color:var(--blue);border-radius:999px;padding:8px 10px;font-weight:900}
.main{padding:16px;max-width:760px;margin:auto}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.kpi{background:#fff;border:1px solid #dbe7f3;border-radius:18px;padding:12px}.kpi small{color:var(--muted);font-weight:900}.kpi b{display:block;font-size:24px;color:var(--blue)}
.grid-menu{display:grid;grid-template-columns:1fr 1fr;gap:12px}.tile{text-align:left;border:0;border-radius:22px;padding:18px;background:#fff;box-shadow:0 16px 38px rgba(15,23,42,.08);color:var(--blue);font-weight:950}.tile span{display:block;font-size:30px;margin-bottom:8px}.tile small{display:block;color:var(--muted);font-weight:800;margin-top:8px}
.tabs{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #dbe7f3;display:grid;grid-template-columns:repeat(5,1fr);padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:10}.tabs button{border:0;background:transparent;border-radius:14px;padding:9px 2px;color:var(--muted);font-size:11px;font-weight:900}.tabs button.active{background:#eef6ff;color:var(--blue)}
.title{font-weight:950;color:#071f3e}.sub{font-size:12px;color:var(--muted);font-weight:700;margin-top:4px}.badge{display:inline-flex;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:900;border:1px solid #cbd5e1;background:#eef6ff;color:#0b2f5b}.actions{display:grid;gap:10px;margin-top:12px}.actions.two{grid-template-columns:1fr 1fr}.empty{padding:18px;border-radius:18px;background:#f8fbff;color:var(--muted);font-weight:800;text-align:center}.item{border-left:3px solid var(--blue2);padding:10px;margin-bottom:8px;background:#f8fbff;border-radius:10px}.photo{width:64px;height:64px;border-radius:18px;object-fit:cover;background:#eef4fb}.worker{display:grid;grid-template-columns:70px 1fr;gap:12px;align-items:center}
</style>
</head>
<body>
<section id="login" class="login"><div class="brand">VALEPAC · EDS 40098</div><h1>Admin Mobile</h1><p>Control móvil inicial para operación.</p><div class="card"><label>Usuario</label><input id="loginUser"><label>Contraseña</label><input id="loginPass" type="password"><button class="primary" onclick="loginApp()">Ingresar</button><div id="loginMsg"></div></div></section>
<section id="app" class="app hidden"><header class="header"><div class="header-row"><div><h2 id="viewTitle">VALEPAC Admin</h2><small>Centro de Control Mobile</small></div><div class="user" onclick="logout()">Salir</div></div></header>
<main class="main">
<section id="homeView"><div class="kpis"><div class="kpi"><small>VTA</small><b id="kVna">0</b></div><div class="kpi"><small>Tickets</small><b id="kTicket">0</b></div><div class="kpi"><small>Eventos</small><b id="kBit">0</b></div></div><br><div class="grid-menu"><button class="tile" onclick="showView('bitView')"><span>📝</span>Bitácora<small>Eventos</small></button><button class="tile" onclick="showView('vnaView')"><span>💳</span>VTA No Abonadas<small>Casos</small></button><button class="tile" onclick="showView('atView')"><span>👥</span>Desempeño AT<small>Personal</small></button><button class="tile" onclick="showView('ticketView')"><span>🎫</span>Ticket Atendedor<small>Solicitudes</small></button></div></section>
<section id="bitView" class="hidden"><div class="actions two"><button class="primary" onclick="showBitForm()">Nuevo evento</button><button class="secondary" onclick="loadBitacora()">Actualizar</button></div><div id="bitList"></div></section>
<section id="bitFormView" class="hidden"><div class="card"><h2>Nuevo evento</h2><label>Título</label><input id="bitTitulo"><label>Categoría</label><select id="bitCategoria"><option>Operación</option><option>Seguridad</option><option>Mantención</option><option>Cliente</option><option>Fiscalización</option><option>Personal</option><option>Otro</option></select><label>Gravedad</label><select id="bitGravedad"><option>Baja</option><option>Media</option><option>Alta</option></select><label>Estado</label><select id="bitEstado"><option>Abierto</option><option>En seguimiento</option><option>Cerrado</option><option>Atendido</option></select><label>Descripción</label><textarea id="bitDescripcion"></textarea><label>Archivo/foto</label><input id="bitArchivo" type="file" accept=".jpg,.jpeg,.png,.webp,.pdf,image/*,.xlsx,.xls" capture="environment"><button class="primary" onclick="createBitacora()">Guardar evento</button><div id="bitMsg"></div></div></section>
<section id="bitDetailView" class="hidden"><div id="bitDetail"></div></section>
<section id="vnaView" class="hidden"><div class="actions two"><button class="primary" onclick="showVnaForm()">Nuevo caso</button><button class="secondary" onclick="loadVna()">Actualizar</button></div><div id="vnaList"></div></section>
<section id="vnaFormView" class="hidden"><div class="card"><h2>Nuevo VTA no abonada</h2><label>Requerimiento</label><input id="vnaReq"><label>Monto</label><input id="vnaMonto" type="number"><label>Conductor</label><input id="vnaConductor"><label>Detalle</label><textarea id="vnaDetalle"></textarea><label>Archivo/foto</label><input id="vnaArchivo" type="file" accept=".jpg,.jpeg,.png,.webp,.pdf,image/*,.xlsx,.xls" capture="environment"><button class="primary" onclick="createVna()">Guardar caso</button><div id="vnaMsg"></div></div></section>
<section id="vnaDetailView" class="hidden"><div id="vnaDetail"></div></section>
<section id="atView" class="hidden"><div class="actions two"><button class="primary" onclick="showAtNoteForm()">Nueva anotación</button><button class="secondary" onclick="loadAt()">Actualizar</button></div><div id="atList"></div></section>
<section id="atNoteFormView" class="hidden"><div class="card"><h2>Nueva anotación</h2><label>Trabajador</label><select id="noteTrabajador"></select><label>Tipo</label><select id="noteTipo"><option>Positiva</option><option>Negativa</option></select><label>Título</label><input id="noteTitulo"><label>Detalle</label><textarea id="noteDetalle"></textarea><button class="primary" onclick="createAtNote()">Guardar</button><div id="noteMsg"></div></div></section>
<section id="workerDetailView" class="hidden"><div id="workerDetail"></div></section>
<section id="ticketView" class="hidden"><div class="actions two"><button class="secondary" onclick="loadTickets()">Actualizar</button><button class="ghost" onclick="renderHome()">Dashboard</button></div><div id="ticketList"></div></section>
<section id="ticketDetailView" class="hidden"><div id="ticketDetail"></div></section>
</main><nav class="tabs"><button id="tabHome" class="active" onclick="showView('homeView')">Inicio</button><button id="tabBit" onclick="showView('bitView')">Bitácora</button><button id="tabVna" onclick="showView('vnaView')">VTA</button><button id="tabAt" onclick="showView('atView')">AT</button><button id="tabTicket" onclick="showView('ticketView')">Tickets</button></nav></section>
<script>
const SUPABASE_URL='https://emyskqnsyspzjrguycjk.supabase.co';const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVteXNrcW5zeXNwempyZ3V5Y2prIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MDg5NDcsImV4cCI6MjA5NTQ4NDk0N30.bLCSwgLCop1Gg4rCbunFe4YCP_KHxIIFGF28vR0XD-0';const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);const bucket='documentos-sec';let bits=[],vnas=[],workers=[],notes=[],tickets=[],hist=[],currentUser=null;
function loginApp(){const u=(loginUser.value||'').trim().toLowerCase(),p=(loginPass.value||'').trim();if(u==='gabrielarancibia'&&p==='portalvalepac'){currentUser={nombre:'Gabriel Arancibia'};login.classList.add('hidden');app.classList.remove('hidden');loadAll();return}loginMsg.innerHTML='<div class="msg error">Usuario o contraseña incorrectos.</div>'}function logout(){location.reload()}function fmt(d){if(!d)return'-';return new Date(d).toLocaleString('es-CL',{dateStyle:'short',timeStyle:'short'})}function money(v){return v?Number(v).toLocaleString('es-CL',{style:'currency',currency:'CLP'}):'-'}function safeFileName(n){return String(n||'archivo').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9._-]/g,'_')}function msg(el,t,c='ok'){el.innerHTML=`<div class="msg ${c}">${t}</div>`}function badge(s){return `<span class="badge">${s||'-'}</span>`}
async function loadAll(){await Promise.all([loadBitacora(),loadVna(),loadAt(),loadTickets()]);renderHome()}function showView(id){['homeView','bitView','bitFormView','bitDetailView','vnaView','vnaFormView','vnaDetailView','atView','atNoteFormView','workerDetailView','ticketView','ticketDetailView'].forEach(v=>document.getElementById(v).classList.add('hidden'));document.getElementById(id).classList.remove('hidden');tabHome.classList.toggle('active',id==='homeView');tabBit.classList.toggle('active',id.startsWith('bit'));tabVna.classList.toggle('active',id.startsWith('vna'));tabAt.classList.toggle('active',id.startsWith('at')||id==='workerDetailView');tabTicket.classList.toggle('active',id.startsWith('ticket'));viewTitle.textContent=id==='homeView'?'VALEPAC Admin':id.startsWith('bit')?'Bitácora':id.startsWith('vna')?'VTA No Abonadas':id.startsWith('at')||id==='workerDetailView'?'Desempeño AT':'Ticket Atendedor'}
function renderHome(){kVna.textContent=vnas.filter(v=>!['Aprobado','Rechazado'].includes(v.etapa)).length;kTicket.textContent=tickets.filter(t=>!['Atendido','Aprobado','Rechazado'].includes(t.estado)).length;kBit.textContent=bits.filter(b=>!['Cerrado','Atendido'].includes(b.estado)).length}
async function loadBitacora(){const{data}=await client.from('bitacora_eventos').select('*').order('fecha_evento',{ascending:false});bits=data||[];renderBitList()}function renderBitList(){bitList.innerHTML=bits.map(b=>`<div class="card" onclick="openBit(${b.id})"><div class="title">${b.titulo}</div><div class="sub">${b.categoria||'-'} · ${fmt(b.fecha_evento)}</div>${badge(b.estado)} ${badge(b.gravedad)}</div>`).join('')||'<div class="empty">Sin eventos.</div>'}function showBitForm(){showView('bitFormView');bitTitulo.value=bitDescripcion.value='';bitArchivo.value=''}async function createBitacora(){let archivo_url=null,archivo_nombre=null;const file=bitArchivo.files[0];if(file){const path=`bitacora/admin-mobile/${Date.now()}_${safeFileName(file.name)}`;const up=await client.storage.from(bucket).upload(path,file,{upsert:true});if(up.error){msg(bitMsg,up.error.message,'error');return}archivo_url=client.storage.from(bucket).getPublicUrl(path).data.publicUrl;archivo_nombre=file.name}const payload={fecha_evento:new Date().toISOString(),titulo:bitTitulo.value,categoria:bitCategoria.value,gravedad:bitGravedad.value,estado:bitEstado.value,responsable:currentUser.nombre,descripcion:bitDescripcion.value,archivo_url,archivo_nombre};if(!payload.titulo){msg(bitMsg,'Falta título.','error');return}const{error}=await client.from('bitacora_eventos').insert(payload);if(error){msg(bitMsg,error.message,'error');return}msg(bitMsg,'Evento guardado.','ok');await loadBitacora();setTimeout(()=>showView('bitView'),500)}
async function openBit(id){const b=bits.find(x=>x.id===id);bitDetail.innerHTML=`<div class="card"><h2>${b.titulo}</h2>${badge(b.estado)}<p>${b.descripcion||'-'}</p>${b.archivo_url?`<a target="_blank" href="${b.archivo_url}">Ver archivo</a>`:''}</div>`;showView('bitDetailView')}
async function loadVna(){const{data}=await client.from('ventas_no_abonadas').select('*').order('created_at',{ascending:false});vnas=data||[];renderVnaList()}function renderVnaList(){vnaList.innerHTML=vnas.map(v=>`<div class="card" onclick="openVna(${v.id})"><div class="title">Req. ${v.requerimiento}</div><div class="sub">${v.nombre_conductor||'-'} · ${money(v.monto)}</div>${badge(v.etapa)}</div>`).join('')||'<div class="empty">Sin casos.</div>'}function showVnaForm(){showView('vnaFormView');vnaReq.value=vnaMonto.value=vnaConductor.value=vnaDetalle.value='';vnaArchivo.value=''}async function createVna(){let archivo_url=null,archivo_nombre=null;const file=vnaArchivo.files[0];if(file){const path=`vta-no-abonada/admin-mobile/${Date.now()}_${safeFileName(file.name)}`;const up=await client.storage.from(bucket).upload(path,file,{upsert:true});if(up.error){msg(vnaMsg,up.error.message,'error');return}archivo_url=client.storage.from(bucket).getPublicUrl(path).data.publicUrl;archivo_nombre=file.name}const payload={requerimiento:vnaReq.value,monto:vnaMonto.value||null,fecha_hora:new Date().toISOString(),nombre_conductor:vnaConductor.value,detalle:vnaDetalle.value,etapa:'Ingresado',resolucion:'Pendiente',archivo_url,archivo_nombre};if(!payload.requerimiento){msg(vnaMsg,'Falta requerimiento.','error');return}const{error}=await client.from('ventas_no_abonadas').insert(payload);if(error){msg(vnaMsg,error.message,'error');return}msg(vnaMsg,'Caso guardado.','ok');await loadVna();setTimeout(()=>showView('vnaView'),500)}
function openVna(id){const v=vnas.find(x=>x.id===id);vnaDetail.innerHTML=`<div class="card"><h2>Req. ${v.requerimiento}</h2>${badge(v.etapa)}<p>${v.nombre_conductor||'-'} · ${money(v.monto)}</p><p>${v.detalle||''}</p>${v.archivo_url?`<a target="_blank" href="${v.archivo_url}">Ver archivo</a>`:''}</div>`;showView('vnaDetailView')}
async function loadAt(){const{data}=await client.from('atendedores_nomina').select('*').order('nombre',{ascending:true});workers=data||[];const{data:n}=await client.from('anotaciones_desempeno_at').select('*').order('fecha_anotacion',{ascending:false});notes=n||[];renderAtList();fillWorkers()}function fillWorkers(){noteTrabajador.innerHTML='<option value="">Seleccionar</option>'+workers.filter(w=>(w.estado||'Activo')==='Activo').map(w=>`<option value="${w.id}">${w.nombre}</option>`).join('')}function renderAtList(){atList.innerHTML=workers.map(w=>`<div class="card worker" onclick="openWorker(${w.id})">${w.foto_url?`<img class="photo" src="${w.foto_url}">`:'<div class="photo"></div>'}<div><div class="title">${w.nombre}</div><div class="sub">${w.rut||'-'} · ${w.estado||'Activo'}</div></div></div>`).join('')||'<div class="empty">Sin atendedores.</div>'}function showAtNoteForm(){showView('atNoteFormView');fillWorkers();noteTitulo.value=noteDetalle.value=''}async function createAtNote(){const payload={trabajador_id:noteTrabajador.value,tipo:noteTipo.value,fecha_anotacion:new Date().toISOString(),responsable:currentUser.nombre,titulo:noteTitulo.value,detalle:noteDetalle.value};if(!payload.trabajador_id||!payload.titulo){msg(noteMsg,'Falta trabajador o título.','error');return}const{error}=await client.from('anotaciones_desempeno_at').insert(payload);if(error){msg(noteMsg,error.message,'error');return}msg(noteMsg,'Anotación guardada.','ok');await loadAt();setTimeout(()=>showView('atView'),500)}
function openWorker(id){const w=workers.find(x=>x.id===id);const wn=notes.filter(n=>n.trabajador_id===id);workerDetail.innerHTML=`<div class="card">${w.foto_url?`<img class="photo" style="width:120px;height:120px;border-radius:28px" src="${w.foto_url}">`:''}<h2>${w.nombre}</h2><p>${w.rut||'-'} · ${w.estado||'Activo'}</p></div><div class="card">${wn.map(n=>`<div class="item"><b>${n.titulo}</b><br>${badge(n.tipo)}<p>${n.detalle||''}</p></div>`).join('')||'<div class="empty">Sin anotaciones.</div>'}</div>`;showView('workerDetailView')}
async function loadTickets(){const{data}=await client.from('tickets_atendedor').select('*, atendedores_nomina(nombre,rut)').order('updated_at',{ascending:false});tickets=data||[];renderTicketList()}function renderTicketList(){ticketList.innerHTML=tickets.map(t=>`<div class="card" onclick="openTicket(${t.id})"><div class="title">${t.titulo}</div><div class="sub">${t.atendedores_nomina?.nombre||'-'} · ${t.tipo}</div>${badge(t.estado)}</div>`).join('')||'<div class="empty">Sin tickets.</div>'}function openTicket(id){const t=tickets.find(x=>x.id===id);ticketDetail.innerHTML=`<div class="card"><h2>${t.titulo}</h2>${badge(t.estado)}<p>${t.atendedores_nomina?.nombre||'-'}</p><p>${t.detalle||'-'}</p>${t.archivo_url?`<a target="_blank" href="${t.archivo_url}">Ver archivo</a>`:''}</div>`;showView('ticketDetailView')}
if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}))}
</script>
</body></html>
